---
name: Linter

on: [pull_request]

jobs:
  lint:
    name: "Linter"
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup node 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store path
        id: pnpm-store-path
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache Node Modules V1
        uses: actions/cache@v4
        with:
          path: |
            packages/v1/node_modules
            ${{ steps.pnpm-store-path.outputs.dir }}
          key: embedded-pnpm-${{ hashFiles('packages/v1/pnpm-lock.yaml') }}
          restore-keys: |
            embedded-pnpm-

      - name: Cache Node Modules V2
        uses: actions/cache@v4
        with:
          path: |
            packages/v2/node_modules
            ${{ steps.pnpm-store-path.outputs.dir }}
          key: embedded-pnpm-${{ hashFiles('packages/v2/pnpm-lock.yaml') }}
          restore-keys: |
            embedded-pnpm-

      - name: Install Dependencies v1
        run: |
          cd packages/v1
          pnpm install --frozen-lockfile

      - name: Install Dependencies v2
        run: |
          cd packages/v2
          pnpm install --frozen-lockfile

      - name: Run Lint v1
        run: |
          cd packages/v1 && pnpm lint

      - name: Run Lint v2
        run: |
          cd packages/v2 && pnpm lint
